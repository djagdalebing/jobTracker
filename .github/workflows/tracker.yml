name: Website Tracker

on:
  workflow_dispatch: # Manual trigger + API re-trigger chain

permissions:
  contents: write

concurrency:
  group: tracker
  cancel-in-progress: false

jobs:
  check-websites:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # 5h50m — slightly above MAX_RUNTIME_MINUTES

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Restore tracker data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data

      - name: Run tracker (looping mode)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_once.py

      - name: Final data push
        if: always()
        run: |
          git add data/ || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update tracker data [skip ci]"
          fi
          git pull --rebase origin main || true
          git push || echo "Push failed — data saved in next run."

      - name: Re-trigger workflow
        if: always()
        run: |
          echo "⏰ Triggering next workflow run..."
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/tracker.yml/dispatches \
            -d '{"ref":"main"}' \
          && echo "✅ Next run triggered." \
          || echo "⚠️ Failed to trigger next run — cron will restart it."
